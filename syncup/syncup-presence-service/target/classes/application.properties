# Server
server.port=8080
server.servlet.context-path=/

# Application name
spring.application.name=syncup-presence-service
  
  # Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/syncup_db
spring.datasource.username=postgres
spring.datasource.password=tejTBR@28
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
  
  # JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
  
  # Redis
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
  
  # Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
  
  # JWT
jwt.secret=${JWT_SECRET:syncup-super-secret-jwt-key-change-in-production-min-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}
  
  # Logging
logging.level.com.syncup=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.socket=INFO

spring.main.allow-circular-references=true

# Kafka Producer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


# ==================== Groq AI Configuration ====================

# Base URL for Groq
spring.ai.openai.base-url=https://api.groq.com/openai

# API Key - Try these options one by one:

# Option 1: Direct key (for quick testing)
spring.ai.openai.api-key=${OPENAI_API_KEY}

# Option 2: Use Environment Variable (Recommended for production)
# spring.ai.openai.api-key=${GROQ_API_KEY}

# Model Configuration
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=1000

# Optional: Reduce retry noise
spring.ai.retry.enabled=false